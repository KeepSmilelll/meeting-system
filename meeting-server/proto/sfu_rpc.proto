syntax = "proto3";

package sfu_rpc;

option go_package = "meeting-server/signaling/protocol/pb;pb";

message CreateRoomReq {
  string meeting_id = 1;
  int32 max_publishers = 2;
}

message CreateRoomRsp {
  bool success = 1;
  string sfu_address = 2;
}

message DestroyRoomReq {
  string meeting_id = 1;
}

message DestroyRoomRsp {
  bool success = 1;
}

message AddPublisherReq {
  string meeting_id = 1;
  string user_id = 2;
  uint32 audio_ssrc = 3;
  uint32 video_ssrc = 4;
}

message AddPublisherRsp {
  bool success = 1;
}

message SetupTransportReq {
  string meeting_id = 1;
  string user_id = 2;
  bool publish_audio = 3;
  bool publish_video = 4;
  string client_ice_ufrag = 5;
  string client_ice_pwd = 6;
  string client_dtls_fingerprint = 7;
  repeated string client_candidates = 8;
}

message SetupTransportRsp {
  bool success = 1;
  string server_ice_ufrag = 2;
  string server_ice_pwd = 3;
  string server_dtls_fingerprint = 4;
  repeated string server_candidates = 5;
  uint32 assigned_audio_ssrc = 6;
  uint32 assigned_video_ssrc = 7;
}

message TrickleIceCandidateReq {
  string meeting_id = 1;
  string user_id = 2;
  string candidate = 3;
  string sdp_mid = 4;
  int32 sdp_mline_index = 5;
  bool end_of_candidates = 6;
}

message TrickleIceCandidateRsp {
  bool success = 1;
}

message CloseTransportReq {
  string meeting_id = 1;
  string user_id = 2;
}

message CloseTransportRsp {
  bool success = 1;
}

message AddSubscriberReq {
  string meeting_id = 1;
  string user_id = 2;
  uint32 audio_ssrc = 3;
  uint32 video_ssrc = 4;
}

message AddSubscriberRsp {
  bool success = 1;
}

message RemovePublisherReq {
  string meeting_id = 1;
  string user_id = 2;
}

message RemovePublisherRsp {
  bool success = 1;
}

message RemoveSubscriberReq {
  string meeting_id = 1;
  string user_id = 2;
}

message RemoveSubscriberRsp {
  bool success = 1;
}

message GetNodeStatusReq {
  bool probe = 1;
}

message GetNodeStatusRsp {
  bool success = 1;
  string sfu_address = 2;
  uint32 media_port = 3;
  uint32 room_count = 4;
  uint32 publisher_count = 5;
  uint64 packet_count = 6;
}

message ReportNodeStatusReq {
  string node_id = 1;
  string rpc_address = 2;
  string sfu_address = 3;
  uint32 max_meetings = 4;
  uint32 media_port = 5;
  uint32 room_count = 6;
  uint32 publisher_count = 7;
  uint64 packet_count = 8;
}

message ReportNodeStatusRsp {
  bool success = 1;
}

message QualityReport {
  string meeting_id = 1;
  string user_id = 2;
  float packet_loss = 3;
  uint32 rtt_ms = 4;
  uint32 jitter_ms = 5;
  uint32 bitrate_kbps = 6;
}

message KeyframeRequest {
  string meeting_id = 1;
  string user_id = 2;
}
