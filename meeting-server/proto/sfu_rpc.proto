syntax = "proto3";

package sfu_rpc;

option go_package = "meeting-server/signaling/protocol/pb;pb";

message CreateRoomReq {
  string meeting_id = 1;
  int32 max_publishers = 2;
}

message CreateRoomRsp {
  bool success = 1;
  string sfu_address = 2;
}

message DestroyRoomReq {
  string meeting_id = 1;
}

message DestroyRoomRsp {
  bool success = 1;
}

message AddPublisherReq {
  string meeting_id = 1;
  string user_id = 2;
  uint32 audio_ssrc = 3;
  uint32 video_ssrc = 4;
}

message AddPublisherRsp {
  bool success = 1;
  uint32 udp_port = 2;
}

message RemovePublisherReq {
  string meeting_id = 1;
  string user_id = 2;
}

message RemovePublisherRsp {
  bool success = 1;
}

message GetNodeStatusReq {
  bool probe = 1;
}

message GetNodeStatusRsp {
  bool success = 1;
  string sfu_address = 2;
  uint32 media_port = 3;
  uint32 room_count = 4;
  uint32 publisher_count = 5;
  uint64 packet_count = 6;
}

message ReportNodeStatusReq {
  string node_id = 1;
  string rpc_address = 2;
  string sfu_address = 3;
  uint32 max_meetings = 4;
  uint32 media_port = 5;
  uint32 room_count = 6;
  uint32 publisher_count = 7;
  uint64 packet_count = 8;
}

message ReportNodeStatusRsp {
  bool success = 1;
}

message QualityReport {
  string meeting_id = 1;
  string user_id = 2;
  float packet_loss = 3;
  uint32 rtt_ms = 4;
  uint32 jitter_ms = 5;
  uint32 bitrate_kbps = 6;
}

message KeyframeRequest {
  string meeting_id = 1;
  string user_id = 2;
}
